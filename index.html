    <style>

            cursor: pointer; margin: 0 auto; position: relative; backdrop-filter: blur(10px);

      .seat:active { transform: scale(0.9); }
      .seat.taken { border-color: #FFD700; background: rgba(255,215,0,0.4); box-shadow: 0 0 20px rgba(255,215,0,0.5); }
      .seat-photo {
            width: 54px; height: 54px; border-radius: 50%; background: #BDBDBD;

            white-space: nowrap; font-weight: 600; max-width: 80px; overflow: hidden; text-overflow: ellipsis;
        }
        
        /* Chat Box */
      .chat-box {
            background: white; margin: 16px; border-radius: 20px; padding: 12px;

        }
      .chat-msg { margin-bottom: 8px; font-size: 14px; }
      .chat-msg strong { color: #00C853; }
      .chat-input-row {
            display: flex; gap: 8px; padding: 0 16px 16px;
        }
      .chat-input {
            flex: 1; padding: 12px; border: 1.5px solid #E0E0E0; border-radius: 20px;

      .send-btn {
            width: 48px; height: 48px; border-radius: 50%; background: #00C853;

        }
        
        /* Bottom Nav - 3 Tabs Only */
      .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: white;

            background: none; border: none; color: #999; font-size: 24px;

      .nav-btn.active { color: #00C853; }
        
        /* Create Room Modal */
      .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;
        }
      .modal.active { display: flex; }
      .modal-content {
            background: white; border-radius: 24px; padding: 24px; width: 90%; max-width: 400px;
        }
      .modal-content h2 { margin-bottom: 20px; font-size: 20px; }
      .modal-content input { margin-bottom: 16px; }
    </style>
</head>

<script>
    let socket, user, currentRoom = null;

    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(page + 'Page').classList.add('active');
        
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(page === 'home') document.getElementById('navHome').classList.add('active');
        if(page === 'message') document.getElementById('navMessage').classList.add('active');
        if(page === 'me') document.getElementById('navMe').classList.add('active');
        
        if(page === 'home') loadRooms();
    }

    async function login(){
        const msg = document.getElementById('loginMsg');
        msg.textContent = 'Logging in...';
        msg.style.color = '#00C853';
        
        try {
            const r = await fetch('/api/auth/login',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    email:document.getElementById('loginEmail').value,
                    password:document.getElementById('loginPassword').value
                })
            });
            const d = await r.json();
            
            if(d.success){
                user = d.user;
                localStorage.setItem('user', JSON.stringify(user));
                initApp();
            } else {
                msg.textContent = d.message;
                msg.style.color = '#F44336';
            }
        } catch(err) {
            msg.textContent = 'Server Error!';
            msg.style.color = '#F44336';
        }
    }

    function initApp(){
        document.getElementById('loginPage').classList.remove('active');
        document.getElementById('bottomNav').style.display = 'flex';
        updateProfile();
        showPage('me');
        connectSocket();
    }

    function updateProfile(){
        document.getElementById('userName').textContent = user.name;
        document.getElementById('userIdText').textContent = user.userId;
        document.getElementById('followers').textContent = user.followers;
        document.getElementById('following').textContent = user.following;
        document.getElementById('visitors').textContent = user.visitors;
    }

    function connectSocket(){
        socket = io();
        
        socket.on('room-list', (rooms) => {
            const roomList = document.getElementById('roomList');
            roomList.innerHTML = '';
            rooms.forEach(room => {
                const card = document.createElement('div');
                card.className = 'room-card';
                card.onclick = () => joinRoom(room.roomId);
                card.innerHTML = `
                    <div class="room-avatar">🎙️</div>
                    <div class="room-details">
                        <h3>${room.roomName}</h3>
                        <p>👥 ${room.onlineCount} online • Host: ${room.hostName}</p>
                    </div>
                `;
                roomList.appendChild(card);
            });
        });

        socket.on('room-state', (data) => {
            document.getElementById('roomName').textContent = data.roomName;
            renderSeats(data.seats);
            data.messages.forEach(m => addChatMessage(m));
        });

        socket.on('seat-update', (data) => {
            const seatEl = document.getElementById(`seat-${data.seatNumber}`);
            if(data.action === 'take'){
                seatEl.innerHTML = `
                    <div class="seat-photo">${data.userPhoto? `<img src="${data.userPhoto}">` : '👤'}</div>
                    <div class="seat-name">${data.userName}</div>
                `;
                seatEl.classList.add('taken');
            } else {
                seatEl.innerHTML = '<div style="font-size:30px;color:white;">+</div>';
                seatEl.classList.remove('taken');
            }
        });

        socket.on('user-count', (data) => {
            document.getElementById('onlineCount').textContent = data.count;
        });

        socket.on('new-message', (msg) => {
            addChatMessage(msg);
        });        socket.on('voice-offer', async (data) => {
            const peer = createPeerConnection(data.from);
            await peer.setRemoteDescription(data.offer);
            const answer = await peer.createAnswer();
            await peer.setLocalDescription(answer);
            socket.emit('voice-answer', { target: data.from, answer: answer });
        });

        socket.on('voice-answer', async (data) => {
            const peer = peerConnections[data.from];
            if(peer){
                await peer.setRemoteDescription(data.answer);
            }
        });

        socket.on('voice-candidate', async (data) => {
            const peer = peerConnections[data.from];
            if(peer){
                await peer.addIceCandidate(data.candidate);
            }
        });
    }    let localStream = null;
    let peerConnections = {};

    async function startVoice(){
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            console.log('✅ Mic started');
        } catch(err){
            console.error('❌ Mic error:', err);
            alert('Mic permission দাও!');
        }
    }

    function stopVoice(){
        if(localStream){
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        Object.values(peerConnections).forEach(pc => pc.close());
        peerConnections = {};
        console.log('🔇 Mic stopped');
    }

    function createPeerConnection(targetUserId){
        const peer = new RTCPeerConnection({
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        });

        if(localStream){
            localStream.getTracks().forEach(track => peer.addTrack(track, localStream));
        }

        peer.ontrack = (event) => {
            console.log('✅ Got remote stream from:', targetUserId);
            let audio = document.getElementById('audio-' + targetUserId);
            if(!audio){
                audio = document.createElement('audio');
                audio.id = 'audio-' + targetUserId;
                audio.autoplay = true;
                document.body.appendChild(audio);
            }
            audio.srcObject = event.streams[0];
        };

        peer.onicecandidate = (event) => {
            if(event.candidate){
                socket.emit('voice-candidate', {
                    target: targetUserId,
                    candidate: event.candidate
                });
            }
        };

        peerConnections[targetUserId] = peer;
        return peer;
    }

    async function createOffer(targetUserId){
        if(!localStream) return;
        const peer = createPeerConnection(targetUserId);
        const offer = await peer.createOffer();
        await peer.setLocalDescription(offer);
        socket.emit('voice-offer', { target: targetUserId, offer: offer });
    }

    function callAllUsersInSeats(){
        const seats = document.querySelectorAll('.seat.taken');
        seats.forEach(seat => {
            const userId = seat.getAttribute('data-userid');
            if(userId && userId!== user.userId){
                createOffer(userId);
            }
        });
    }

    function loadRooms(){
        socket.emit('get-rooms');
    }

    function showCreateRoom(){
        document.getElementById('createRoomModal').classList.add('active');
    }

    function closeCreateRoom(){
        document.getElementById('createRoomModal').classList.remove('active');
        document.getElementById('newRoomName').value = '';
    }

    async function createRoom(){
        const roomName = document.getElementById('newRoomName').value.trim();
        if(!roomName) {
            alert('Please enter room name');
            return;
        }
        
        const r = await fetch('/api/room/create', {
            method: 'POST',
            h
